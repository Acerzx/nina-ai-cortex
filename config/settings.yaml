# ============================================================================
# НОВАЯ СЕКЦИЯ: CORS (audit F2)
# Заменить на актуальные домены фронтенда в production!
# ============================================================================
cors:
  enabled: true
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
    - "http://localhost:8080"
    - "http://127.0.0.1:3000"
    - "http://127.0.0.1:5173"
    # Production domains (раскомментируйте и замените):
    # - "https://cortex.your-domain.com"
    # - "https://observatory.local"
  allow_credentials: true
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "Authorization"
    - "Content-Type"
    - "X-API-Key"
    - "X-Request-ID"
  max_age: 3600

# ============================================================================
# НОВАЯ СЕКЦИЯ: Authentication (audit C4)
# ============================================================================
auth:
  enabled: true
  access_token_expire_minutes: 1440 # 24 часа
  rate_limit_per_minute: 120
  llm_rate_limit_per_minute: 20
  trigger_rate_limit_per_minute: 30
  public_paths:
    - "/"
    - "/docs"
    - "/openapi.json"
    - "/redoc"
    - "/health"
    - "/metrics"

# ============================================================================
# НОВАЯ СЕКЦИЯ: Thresholds (audit 7.2 — магические числа)
# ============================================================================
thresholds:
  # Watcher Agent
  hfr_increase_percent: 30.0
  rms_ra_critical: 2.0
  rms_dec_critical: 2.0
  temperature_deviation: 2.0
  wind_speed_warning: 15.0
  wind_gust_critical: 20.0
  z_score_threshold: 3.0
  # Calibrator Agent (дней)
  bias_freshness_days: 90
  dark_freshness_days: 30
  flat_freshness_days: 7
  # Preflight gates
  cloud_cover_max_percent: 80.0
  wind_speed_max_mps: 20.0
  humidity_max_percent: 90.0
  min_free_disk_space_gb: 20.0
