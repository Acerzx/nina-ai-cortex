# ============================================================================
# N.I.N.A. AI Cortex — Конфигурация (ПОЛНАЯ ВЕРСИЯ v3.0)
# ============================================================================
# Все пути параметризированы. Система работает на любом ПК.
# Переменные окружения подставляются через ${VAR_NAME}
#
# Файл разделён на секции:
#   1.  nina_environment     — пути к файлам N.I.N.A.
#   2.  network              — сетевые подключения
#   3.  influxdb             — time-series БД для метрик
#   4.  qdrant               — векторная БД для RAG
#   5.  ws_broadcast         — WebSocket для Frontend
#   6.  ai_settings          — LLM и embeddings
#   7.  home_assistant       — интеграция с умным домом
#   8.  hal                  — Hardware Abstraction Layer
#   9.  watchers             — настройки файловых вотчеров
#  10.  plugins_status       — статус плагинов N.I.N.A.
#  11.  logging              — настройки логирования
#  12.  cors                 — Cross-Origin Resource Sharing
#  13.  auth                 — аутентификация и авторизация
#  14.  security             — маскирование чувствительных данных
#  15.  thresholds           — пороговые значения для агентов
#  16.  data_sources         — выбор источников метрик
#  17.  decision_audit       — политика хранения решений
#  18.  nina_api_client      — HTTP-клиент для N.I.N.A. API (Circuit Breaker, Retry)
#  19.  execution            — Trigger Emulator (защищённые параметры, диапазоны)
#  20.  storage_disk_monitor — Disk Monitor (пороги предупреждения)
#  21.  simulation           — Fake N.I.N.A. (метрики, шум, аномалии)
#  22.  simulation_phd2      — Fake PHD2 (метрики гидирования)
#  23.  auditor              — Auditor Agent (quality scoring)
#  24.  diagnostician        — Diagnostician Agent (корреляции)
#  25.  copilot              — Copilot Agent (таймауты инструкций)
#  26.  scheduler            — Scheduler Agent (scoring целей)
#  27.  strategist_extra     — Strategist Agent (оптимизация)
#  28.  watcher_extra        — Watcher Agent (детекция аномалий)
#  29.  embeddings           — Embeddings (размерность, кэш)
#  30.  mode_manager         — Mode Manager (health check)
#  31.  rag_extra            — RAG Engine (чанки, поиск)
#  32.  ws_broadcast_extra   — WS Broadcast (heartbeat)
#  33.  observatory_state    — Observatory State (история, тренды)
#  34.  base_agent           — Base Agent (логирование решений)
#  35.  orchestrator_extra   — Orchestrator (очередь, память)
#  36.  hal_extra            — HAL (default altitude)
#  37.  hocus_focus_parser   — Hocus Focus (Z-Score, эксцентриситет)
#  38.  python_bridge_extra  — Python Bridge (лимиты сообщений)
#  39.  safety_interceptor_extra — Safety Interceptor (задержка shutdown)
#  40.  preflight_extra      — Preflight (свежесть мастеров)
#  41.  websocket_client     — WebSocket Client (reconnect, ping)
#  42.  log_tailer           — Log Tailer (poll intervals)
#  43.  prometheus_extra     — Prometheus Scraper (интервал, timeout)
#  44.  influxdb_extra       — InfluxDB Provider (интервал, история)
#  45.  masters_auditor      — Masters Auditor (прогресс-отчёты)
# ============================================================================

# ============================================================================
# 1. ПУТИ N.I.N.A. (nina_environment)
# ============================================================================
nina_environment:
  appdata_root: "C:\\Users\\istep\\AppData\\Local\\NINA"
  sessions_root: "C:\\Users\\istep\\YandexDisk\\Хобби\\Астрономия\\Фото\\Сессии"
  masters_root: "C:\\Users\\istep\\YandexDisk\\Хобби\\Астрономия\\Фото\\Данные\\MASTER FILE\\Masters"
  profiles_dir: "C:\\Users\\istep\\AppData\\Local\\NINA\\Профили"
  sequence_template: "C:\\Users\\istep\\YandexDisk\\Хобби\\Астрономия\\ПО\\N.I.N.A\\Set templates\\Sequence.json"
  logs_dir: "C:\\Users\\istep\\AppData\\Local\\NINA\\Logs"
  plugins_dir: "C:\\Users\\istep\\AppData\\Local\\NINA\\Plugins\\3.0.0"

# ============================================================================
# 2. СЕТЕВЫЕ ПОДКЛЮЧЕНИЯ (network)
# ============================================================================
network:
  nina_api_host: "http://localhost:1888"
  nina_ws_url: "ws://localhost:1888/v2/socket"
  prometheus_url: "http://localhost:9876"

# ============================================================================
# 3. INFLUXDB (influxdb)
# ============================================================================
influxdb:
  url: "http://localhost:8086"
  token: "${INFLUXDB_TOKEN}"
  org: "observatory"
  bucket: "nina_telemetry"

# ============================================================================
# 4. QDRANT (qdrant)
# ============================================================================
qdrant:
  url: "http://localhost:6333"
  collection_name: "nina_sessions"
  embedding_model: "nomic-embed-text"

# ============================================================================
# 5. WEBSOCKET BROADCAST (ws_broadcast)
# ============================================================================
ws_broadcast:
  enabled: true
  path: "/ws"

# ============================================================================
# 6. AI НАСТРОЙКИ (ai_settings)
# ============================================================================
ai_settings:
  ollama_host: "http://localhost:11434"
  model_name: "gemma4:31b-cloud" # [DEPRECATED]
  primary_model: "gemma4:31b-cloud"
  fallback_model: "gemma4:e4b"
  rag_db_path: "./data/vector_db"
  primary_timeout: 30.0
  fallback_timeout: 15.0
  max_tokens: 1500
  temperature: 0.3
  fallback_enabled: true
  connection:
    max_connections: 10
    max_keepalive_connections: 5
    keepalive_expiry: 30
  circuit_breaker:
    failure_threshold: 5
    recovery_timeout_seconds: 60.0
    half_open_max_calls: 1
    enabled: true
  retry:
    max_retries: 3
    base_delay_seconds: 1.0
    max_delay_seconds: 10.0
    enabled: true

# ============================================================================
# 7. HOME ASSISTANT (home_assistant)
# ============================================================================
home_assistant:
  enabled: false
  url: "http://homeassistant.local:8123"
  token: "${HA_TOKEN}"

# ============================================================================
# 8. HARDWARE ABSTRACTION LAYER (hal)
# ============================================================================
hal:
  enabled: true
  min_altitude_limit: 15.0

# ============================================================================
# 9. НАСТРОЙКИ ВОТЧЕРОВ (watchers)
# ============================================================================
watchers:
  debounce_seconds: 1.5
  ai_weather_status_file: "C:\\Users\\istep\\AppData\\Local\\NINA\\AIWeather\\status.json"
  dither_statistics_path: null
  guiding_analyzer_path: null
  dynamic_sequencer_path: null

# ============================================================================
# 10. СТАТУС ПЛАГИНОВ (plugins_status)
# ============================================================================
plugins_status:
  dither_inject: "NOT_INSTALLED"
  guider_calibration: "NOT_INSTALLED"

# ============================================================================
# 11. ЛОГИРОВАНИЕ (logging)
# ============================================================================
logging:
  level: "INFO"
  format: "json"

# ============================================================================
# 12. CORS (cors)
# ============================================================================
cors:
  enabled: true
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
    - "http://localhost:8080"
    - "http://127.0.0.1:3000"
    - "http://127.0.0.1:5173"
  allow_credentials: true
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "Authorization"
    - "Content-Type"
    - "X-API-Key"
    - "X-Request-ID"
  max_age: 3600

# ============================================================================
# 13. АУТЕНТИФИКАЦИЯ (auth)
# ============================================================================
auth:
  enabled: true
  access_token_expire_minutes: 1440
  rate_limit_per_minute: 120
  llm_rate_limit_per_minute: 20
  trigger_rate_limit_per_minute: 30
  algorithm: "HS256"
  jwt_token_length: 48
  api_key_length: 32
  min_secret_length: 32
  public_paths:
    - "/"
    - "/docs"
    - "/openapi.json"
    - "/redoc"
    - "/health"
    - "/metrics"

# ============================================================================
# 14. БЕЗОПАСНОСТЬ (security)
# ============================================================================
security:
  sensitive_patterns:
    - "token"
    - "password"
    - "passwd"
    - "secret"
    - "api_key"
    - "apikey"
    - "api-key"
    - "private_key"
    - "privatekey"
    - "credentials"
    - "auth"
    - "bearer"
    - "access_key"
    - "accesskey"
    - "secret_key"
    - "secretkey"
  mask_value: "***"

# ============================================================================
# 15. ПОРОГОВЫЕ ЗНАЧЕНИЯ (thresholds)
# ============================================================================
thresholds:
  watcher:
    hfr_increase_percent: 30.0
    fwhm_increase_percent: 30.0
    rms_ra_critical: 2.0
    rms_dec_critical: 2.0
    temperature_deviation: 2.0
    wind_speed_warning: 15.0
    wind_gust_critical: 20.0
    z_score_threshold: 3.0
    min_history_points: 5
    anomaly_cooldown_seconds: 300
  calibrator:
    bias_freshness_days: 90
    dark_freshness_days: 30
    flat_freshness_days: 7
    temperature_tolerance: 2.0
    alert_cooldown_seconds: 600
  preflight:
    cloud_cover_max: 80.0
    wind_speed_max: 20.0
    humidity_max: 90.0
    min_free_disk_space_gb: 50.0
    camera_cooled_threshold: -10.0
  strategist:
    snr_target: 20.0
    hfr_target: 2.5
    fwhm_target: 3.0
    acceptance_rate_target: 0.90
    autofocus_interval_normal: 60
    autofocus_interval_frequent: 30
    autofocus_interval_emergency: 15
    hfr_degradation_threshold: 0.05
    min_proposal_interval_seconds: 600
    wind_load_warning: 10.0
  guardian:
    wind_speed_park: 20.0
    cloud_cover_pause: 80.0
    humidity_warning: 90.0
    rms_recalibration: 3.0
    temperature_alarm: 5.0
    cloud_cover_critical: 95.0

# ============================================================================
# 16. ИСТОЧНИКИ ДАННЫХ (data_sources)
# ============================================================================
data_sources:
  primary_metrics_source: "influxdb"
  enable_fallback_source: true
  metrics_poll_interval: 3.0

# ============================================================================
# 17. DECISION AUDIT TRAIL (decision_audit)
# ============================================================================
decision_audit:
  keep_last_days: 90
  max_records: 100000
  archive_before_delete: true
  archive_path: "./data/decision_archives"
  auto_cleanup_enabled: true
  auto_cleanup_interval_hours: 24

# ============================================================================
# 18. N.I.N.A. API CLIENT (nina_api_client)
# ============================================================================
nina_api_client:
  request_timeout: 10.0
  max_connections: 20
  max_keepalive_connections: 10
  keepalive_expiry: 30
  retry:
    max_retries: 3
    base_delay_seconds: 1.0
    max_delay_seconds: 10.0
    enabled: true
  circuit_breaker:
    failure_threshold: 5
    recovery_timeout_seconds: 60.0
    half_open_max_calls: 1
    enabled: true

# ============================================================================
# 19. EXECUTION — TRIGGER EMULATOR (execution)
# ============================================================================
execution:
  protected_params:
    - "cancel"
    - "skipValidation"
  parameter_ranges:
    temperature:
      min: -40.0
      max: 30.0
      description: "Температура камеры (°C)"
    minutes:
      min: 0
      max: 120
      description: "Время охлаждения/нагрева (мин)"
    brightness:
      min: 0
      max: 100
      description: "Яркость плоской панели"
    count:
      min: 1
      max: 100
      description: "Количество кадров"
    exposureTime:
      min: 0.001
      max: 3600.0
      description: "Экспозиция (сек)"
    minExposure:
      min: 0.0
      max: 300.0
      description: "Мин. экспозиция (сек)"
    maxExposure:
      min: 0.0
      max: 600.0
      description: "Макс. экспозиция (сек)"
    azimuth:
      min: 0.0
      max: 360.0
      description: "Азимут купола (°)"
    ra:
      min: 0.0
      max: 360.0
      description: "RA координата (°)"
    dec:
      min: -90.0
      max: 90.0
      description: "Dec координата (°)"
    position:
      min: 0.0
      max: 360.0
      description: "Позиция ротатора (°)"
    rotationAngle:
      min: -360.0
      max: 360.0
      description: "Угол поворота (°)"
    histogramMean:
      min: 0.0
      max: 1.0
      description: "Среднее гистограммы"
    meanTolerance:
      min: 0.0
      max: 1.0
      description: "Допуск среднего"
    gain:
      min: 0
      max: 10000
      description: "Gain камеры"
    offset:
      min: -1000
      max: 10000
      description: "Offset камеры"
    filterId:
      min: 0
      max: 20
      description: "ID фильтра"
  history_max_size: 100
  request_timeout: 30.0

# ============================================================================
# 20. STORAGE — DISK MONITOR (storage_disk_monitor)
# ============================================================================
storage_disk_monitor:
  warning_threshold_gb: 50.0
  critical_threshold_gb: 20.0

# ============================================================================
# 21. SIMULATION — FAKE N.I.N.A. (simulation)
# ============================================================================
simulation:
  flush_every_frames: 10
  flush_every_seconds: 30.0
  frame_interval_seconds: 2.0
  autofocus_duration_seconds: 10.0
  meridian_flip_duration_seconds: 30.0
  metrics_interval_seconds: 3.0
  default_metrics:
    hfr: 2.5
    fwhm: 3.0
    eccentricity: 0.35
    star_count: 150
    median_adu: 15000
    rms_ra: 0.8
    rms_dec: 0.9
    rms_total: 1.2
    camera_temp: -14.8
    focuser_position: 6931
    rotator_angle: 180.0
    mount_altitude: 45.0
    mount_azimuth: 90.0
  default_params:
    target: "M31"
    filter: "Ha"
    exposure_time: 60.0
    gain: 85
    temperature_setpoint: -15.0
  noise:
    hfr_std: 0.05
    fwhm_std: 0.05
    rms_ra_std: 0.02
    rms_dec_std: 0.02
    frame_hfr_std: 0.1
    frame_fwhm_std: 0.1
    frame_stars_std: 10.0
    frame_rms_std: 0.05
    temperature_drift_factor: 0.1
    temperature_noise_std: 0.02
  limits:
    hfr_min: 1.5
    hfr_max: 5.0
    fwhm_min: 2.0
    fwhm_max: 6.0
    rms_ra_min: 0.3
    rms_ra_max: 3.0
    rms_dec_min: 0.3
    rms_dec_max: 3.0
  anomalies:
    hfr_spike: 2.0
    rms_spike: 1.5
    temp_drift: 3.0
  autofocus_improvement:
    hfr_reduction: 0.5
    fwhm_reduction: 0.5
    hfr_floor: 1.8
    fwhm_floor: 2.2

# ============================================================================
# 22. SIMULATION — FAKE PHD2 (simulation_phd2)
# ============================================================================
simulation_phd2:
  initial_rms_ra: 0.8
  initial_rms_dec: 0.9
  initial_rms_total: 1.2
  noise_rms_ra_std: 0.02
  noise_rms_dec_std: 0.02
  rms_min: 0.3
  rms_max: 3.0
  metrics_interval_seconds: 2.0
  guiding_error_spike: 2.0

# ============================================================================
# 23. AUDITOR AGENT (auditor)
# ============================================================================
auditor:
  default_acceptance_rate_estimate: 0.90
  quality_score:
    base_score: 10.0
    hfr_penalty_high: 2.0
    hfr_penalty_medium: 1.0
    hfr_threshold_high: 3.0
    hfr_threshold_medium: 2.5
    fwhm_penalty_high: 2.0
    fwhm_penalty_medium: 1.0
    fwhm_threshold_high: 4.0
    fwhm_threshold_medium: 3.0
    rms_penalty: 1.0
    rms_threshold: 1.5
    acceptance_bonus_threshold: 0.95
    acceptance_penalty_threshold: 0.80
    acceptance_bonus: 1.0
    acceptance_penalty: 1.0
  recommendations:
    hfr_warning_threshold: 2.5
    rms_warning_threshold: 1.5
    wind_warning_threshold: 10.0
  llm_max_tokens: 800
  llm_temperature: 0.3

# ============================================================================
# 24. DIAGNOSTICIAN AGENT (diagnostician)
# ============================================================================
diagnostician:
  correlation_thresholds:
    strong: 0.7
    moderate: 0.5
    weak: 0.3
  min_sample_size: 10
  confidence:
    temperature_correlation: 0.85
    wind_correlation: 0.80
    rms_correlation: 0.75
    heuristic_hfr_drift: 0.6
    heuristic_wind_load: 0.75
    llm_boost: 0.15
    llm_max: 0.95
    default_confidence: 0.5
    unknown_root_cause: "Неизвестная причина"
  llm_max_tokens: 400
  llm_temperature: 0.2
  similar_cases_top_k: 5
  max_recommendations: 5

# ============================================================================
# 25. COPILOT AGENT (copilot)
# ============================================================================
copilot:
  timeouts:
    messagebox: 300
    two_point_alignment: 600
    oag_focus: 900
    filter_selector: 120
  rag_max_tokens: 1000

# ============================================================================
# 26. SCHEDULER AGENT (scheduler)
# ============================================================================
scheduler:
  min_altitude: 30.0
  moon_avoidance_angle: 30.0
  scoring:
    priority_max_score: 40.0
    priority_multiplier: 4.0
    altitude_max_score: 30.0
    altitude_normalizer: 2.0
    moon_distance_max_score: 20.0
    moon_distance_normalizer: 1.0
    progress_max_score: 10.0
    below_horizon_penalty: 50.0
    near_moon_penalty: 10.0
    narrowband_moon_safe_filters:
      - "Ha"
      - "OIII"
      - "SII"
  defaults:
    altitude: 45.0
    moon_distance: 90.0

# ============================================================================
# 27. STRATEGIST AGENT EXTRA (strategist_extra)
# ============================================================================
strategist_extra:
  exposure_limits:
    min: 30.0
    max: 300.0
  exposure_change_threshold: 0.1
  snr_low_threshold_ratio: 0.8
  wind_analysis:
    angle_threshold: 180
    windward_threshold: 90
    angle_complement: 360
  trend_window: 10

# ============================================================================
# 28. WATCHER AGENT EXTRA (watcher_extra)
# ============================================================================
watcher_extra:
  small_sample_threshold_percent: 50.0
  large_sample_no_zscore_threshold_percent: 60.0
  trend_window_sizes:
    small: 5
    baseline: 10
  min_history_for_full_detection: 5

# ============================================================================
# 29. EMBEDDINGS (embeddings)
# ============================================================================
embeddings:
  dimension: 768
  cache_file: "./data/embeddings_cache.pkl"
  timeout: 30.0
  cache_save_interval: 100
  model_name: "nomic-embed-text"

# ============================================================================
# 30. MODE MANAGER (mode_manager)
# ============================================================================
mode_manager:
  health_check_interval: 30
  error_retry_delay: 10
  health_check_timeout: 5.0
  status_log_interval: 300

# ============================================================================
# 31. RAG ENGINE EXTRA (rag_extra)
# ============================================================================
rag_extra:
  chunk_sizes:
    documentation: 1000
    session: 500
    error_log: 300
  chunk_overlap_ratio: 0.25
  search:
    default_top_k: 10
    max_context_multiplier: 4
  embedding_cache_max_size: 10000
  http_timeout: 30.0

# ============================================================================
# 32. WS BROADCAST EXTRA (ws_broadcast_extra)
# ============================================================================
ws_broadcast_extra:
  heartbeat_interval: 30

# ============================================================================
# 33. OBSERVATORY STATE (observatory_state)
# ============================================================================
observatory_state:
  max_history_points: 100
  source_timeout: 30.0
  max_active_alerts: 50
  ai_action_log_size: 1000
  default_camera_temp: -15.0
  default_exposure_time: 60.0
  default_gain: 85
  trend_analysis:
    default_window: 10
    average_window: 20
    std_window: 20
    min_points_for_std: 3
    degradation_threshold_percent: 20.0
    baseline_slice_start: -20
    baseline_slice_end: -10
    recent_slice: -10

# ============================================================================
# 34. BASE AGENT (base_agent)
# ============================================================================
base_agent:
  decision_log_max_size: 1000
  recent_decisions_default: 10

# ============================================================================
# 35. ORCHESTRATOR EXTRA (orchestrator_extra)
# ============================================================================
orchestrator_extra:
  decision_queue_timeout: 1.0
  error_retry_delay: 1.0
  decisions_memory_limit: 1000

# ============================================================================
# 36. HAL EXTRA (hal_extra)
# ============================================================================
hal_extra:
  default_altitude: 90.0

# ============================================================================
# 37. HOCUS FOCUS PARSER (hocus_focus_parser)
# ============================================================================
hocus_focus_parser:
  z_threshold: 3.0
  eccentricity_threshold: 0.85

# ============================================================================
# 38. PYTHON BRIDGE EXTRA (python_bridge_extra)
# ============================================================================
python_bridge_extra:
  max_message_length: 500
  max_log_length: 1000

# ============================================================================
# 39. SAFETY INTERCEPTOR EXTRA (safety_interceptor_extra)
# ============================================================================
safety_interceptor_extra:
  shutdown_delay_minutes: 10

# ============================================================================
# 40. PREFLIGHT EXTRA (preflight_extra)
# ============================================================================
preflight_extra:
  freshness_days:
    BIAS: 90
    DARK: 30
    FLAT: 7

# ============================================================================
# 41. WEBSOCKET CLIENT (websocket_client)
# ============================================================================
websocket_client:
  reconnect_delay: 5.0
  ping_interval: 20
  ping_timeout: 10

# ============================================================================
# 42. LOG TAILER (log_tailer)
# ============================================================================
log_tailer:
  poll_interval: 0.5
  rotation_check_interval: 2.0

# ============================================================================
# 43. PROMETHEUS EXTRA (prometheus_extra)
# ============================================================================
prometheus_extra:
  interval_seconds: 3.0
  timeout: 5.0
  error_log_interval_minutes: 1

# ============================================================================
# 44. INFLUXDB EXTRA (influxdb_extra)
# ============================================================================
influxdb_extra:
  query_interval: 3.0
  error_log_interval_minutes: 1
  history_max_points: 100
  progress_report_interval: 20

# ============================================================================
# 45. MASTERS AUDITOR (masters_auditor)
# ============================================================================
masters_auditor:
  progress_report_interval: 50
