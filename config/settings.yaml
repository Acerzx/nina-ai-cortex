# ============================================================================
# N.I.N.A. AI Cortex — Конфигурация (v4.0)
# ============================================================================
# v4.0 изменения:
#   - Добавлена секция session_metadata (исправление проблемы #7)
#   - Добавлены feature flags для новых идей (RAG, Predictive HAL, ML, etc.)
#   - Добавлена секция security для sensitive patterns
# ============================================================================

# 1. ПУТИ N.I.N.A.
nina_environment:
  appdata_root: "C:\\Users\\istep\\AppData\\Local\\NINA"
  sessions_root: "C:\\Users\\istep\\YandexDisk\\Хобби\\Астрономия\\Фото\\Сессии"
  masters_root: "C:\\Users\\istep\\YandexDisk\\Хобби\\Астрономия\\Фото\\Данные\\MASTER FILE\\Masters"
  profiles_dir: "C:\\Users\\istep\\AppData\\Local\\NINA\\Profiles"
  sequence_template: "C:\\Users\\istep\\YandexDisk\\Хобби\\Астрономия\\ПО\\N.I.N.A\\Set templates\\Sequence.json"
  logs_dir: "C:\\Users\\istep\\AppData\\Local\\NINA\\Logs"
  plugins_dir: "C:\\Users\\istep\\AppData\\Local\\NINA\\Plugins\\3.0.0"

# 2. СЕТЕВЫЕ ПОДКЛЮЧЕНИЯ
network:
  nina_api_host: "http://localhost:1888"
  nina_ws_url: "ws://localhost:1888/v2/socket"
  prometheus_url: "http://localhost:9876"

# 3. INFLUXDB
influxdb:
  url: "http://localhost:8086"
  token: "${INFLUXDB_TOKEN}"
  org: "observatory"
  bucket: "nina_telemetry"

# 4. QDRANT
qdrant:
  url: "http://localhost:6333"
  collection_name: "nina_sessions"
  embedding_model: "nomic-embed-text"

# 5. WEBSOCKET BROADCAST
ws_broadcast:
  enabled: true
  path: "/ws"

# 6. AI НАСТРОЙКИ
ai_settings:
  ollama_host: "http://localhost:11434"
  primary_model: "gemma4:31b-cloud"
  fallback_model: "gemma4:e4b"
  rag_db_path: "./data/vector_db"

# 7. HARDWARE ABSTRACTION LAYER
hal:
  enabled: true
  min_altitude_limit: 15.0

# 8. ВОТЧЕРЫ
watchers:
  debounce_seconds: 1.5
  ai_weather_status_file: "C:\\Users\\istep\\AppData\\Local\\NINA\\AIWeather\\status.json"
  dither_statistics_path: null
  guiding_analyzer_path: null
  dynamic_sequencer_path: null
  # ИСПРАВЛЕНО (проблема #7): Добавлена секция session_metadata
  session_metadata:
    files:
      - "ImageMetaData.json"
      - "AcquisitionDetails.json"
      - "WeatherData.json"

# 9. ЛОГИРОВАНИЕ
logging:
  level: "INFO"
  format: "json"

# 10. CORS (локальное использование — упрощено)
cors:
  enabled: true
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
    - "http://localhost:8080"
    - "http://127.0.0.1:3000"
    - "http://127.0.0.1:5173"
  allow_credentials: true
  allowed_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
  allowed_headers: ["Content-Type", "X-Request-ID"]
  max_age: 3600

# 11. ПОРОГОВЫЕ ЗНАЧЕНИЯ
thresholds:
  watcher:
    hfr_increase_percent: 30.0
    fwhm_increase_percent: 30.0
    rms_ra_critical: 2.0
    rms_dec_critical: 2.0
    temperature_deviation: 2.0
    wind_speed_warning: 15.0
    wind_gust_critical: 20.0
    z_score_threshold: 3.0
    min_history_points: 5
    anomaly_cooldown_seconds: 300
  calibrator:
    bias_freshness_days: 90
    dark_freshness_days: 30
    flat_freshness_days: 7
    temperature_tolerance: 2.0
    alert_cooldown_seconds: 600
  preflight:
    cloud_cover_max: 80.0
    wind_speed_max: 20.0
    humidity_max: 90.0
    min_free_disk_space_gb: 50.0
    camera_cooled_threshold: -10.0
  strategist:
    snr_target: 20.0
    hfr_target: 2.5
    fwhm_target: 3.0
    acceptance_rate_target: 0.90
    autofocus_interval_normal: 60
    autofocus_interval_frequent: 30
    autofocus_interval_emergency: 15
    hfr_degradation_threshold: 0.05
    min_proposal_interval_seconds: 600
    wind_load_warning: 10.0
  guardian:
    wind_speed_park: 20.0
    cloud_cover_pause: 80.0
    humidity_warning: 90.0
    rms_recalibration: 3.0
    temperature_alarm: 5.0
  storage:
    warning_threshold_gb: 50.0
    critical_threshold_gb: 20.0
    retention_keep_last_days: 30
    retention_max_records: 100000

# 12. ИСТОЧНИКИ ДАННЫХ
data_sources:
  primary_metrics_source: "influxdb"
  enable_fallback_source: true
  metrics_poll_interval: 3.0

# 13. DECISION AUDIT TRAIL
decision_audit:
  keep_last_days: 90
  max_records: 100000
  archive_before_delete: true
  archive_path: "./data/decision_archives"
  auto_cleanup_enabled: true
  auto_cleanup_interval_hours: 24

# 14. SIMULATION MODE
simulation:
  flush_every_frames: 10
  flush_every_seconds: 30.0
  frame_delay_seconds: 2.0

# 15. МЕТРИКИ И ИСТОРИЯ
metrics:
  history_max_points: 100
  ai_action_log_max: 1000
  active_alerts_max: 50
  update_interval: 3.0

# 16. OPENAPI
openapi:
  spec_path: "config/nina_api_spec.json"
  auto_load: true
  cache_enabled: true

# 17. EXECUTION
execution:
  agent_aliases:
    autofocus: autofocus
    dither: guider_start
    guider_calibration: guider_calibrate
    phd2_settle: guider_start
    emergency_park: mount_park

# ============================================================================
# НОВОЕ v4.0: FEATURE FLAGS (поведенческие флаги)
# ============================================================================
feature_flags:
  # RAG расширения
  rag:
    auto_update_enabled: false
    multimodal_enabled: false
    sqlite_integration_enabled: true

  # Predictive HAL
  hal:
    predictive_enabled: false
    confidence_threshold_critical: 0.95
    confidence_threshold_medium: 0.85
    confidence_threshold_low: 0.70

  # ML и аналитика
  analytics:
    decision_analyzer_enabled: true
    ml_parameter_optimizer: false

  # Shadow Engine
  shadow:
    mermaid_export_enabled: true
    d3_visualization_enabled: false

  # Метрики
  metrics:
    auto_source_selection: true

  # Интеграции
  integrations:
    siril_enabled: false

  # Reinforcement Learning (заглушка)
  ml:
    rl_pipeline_enabled: false

# ============================================================================
# НОВОЕ v4.0: SECURITY (паттерны чувствительных данных)
# ============================================================================
security:
  sensitive_patterns:
    - token
    - password
    - passwd
    - secret
    - api_key
    - apikey
    - api-key
    - private_key
    - privatekey
    - credentials
    - auth
    - bearer
    - access_key
    - accesskey
    - secret_key
    - secretkey
