# ============================================================================
# N.I.N.A. AI Cortex — Конфигурация (v5.0)
# ============================================================================
# v5.0 изменения (Этап 4 — Pre-flight v2):
#   - Расширен thresholds.preflight: 20 gates в 6 категориях
#   - Добавлены: min_altitude, moon_avoidance_angle, dew_risk_threshold
#   - Добавлены: required_equipment, optional_equipment
#   - Добавлен focus_position_min/max для FocusPositionGate
# ============================================================================

# 1. ПУТИ N.I.N.A.
nina_environment:
  appdata_root: "C:\\Users\\istep\\AppData\\Local\\NINA"
  sessions_root: "C:\\Users\\istep\\YandexDisk\\Хобби\\Астрономия\\Фото\\Сессии"
  masters_root: "C:\\Users\\istep\\YandexDisk\\Хобби\\Астрономия\\Фото\\Данные\\MASTER FILE\\Masters"
  profiles_dir: "C:\\Users\\istep\\AppData\\Local\\NINA\\Profiles"
  sequence_template: "C:\\Users\\istep\\YandexDisk\\Хобби\\Астрономия\\ПО\\N.I.N.A\\Set templates\\Sequence.json"
  logs_dir: "C:\\Users\\istep\\AppData\\Local\\NINA\\Logs"
  plugins_dir: "C:\\Users\\istep\\AppData\\Local\\NINA\\Plugins\\3.0.0"

# 2. СЕТЕВЫЕ ПОДКЛЮЧЕНИЯ
network:
  nina_api_host: "http://localhost:1888"
  nina_ws_url: "ws://localhost:1888/v2/socket"
  prometheus_url: "http://localhost:9876"

# 3. INFLUXDB
influxdb:
  url: "http://localhost:8086"
  token: "${INFLUXDB_TOKEN}"
  org: "observatory"
  bucket: "nina_telemetry"

# 4. QDRANT
qdrant:
  url: "http://localhost:6333"
  collection_name: "nina_sessions"
  embedding_model: "nomic-embed-text"

# 5. WEBSOCKET BROADCAST
ws_broadcast:
  enabled: true
  path: "/ws"

# 6. AI НАСТРОЙКИ
ai_settings:
  ollama_host: "http://localhost:11434"
  primary_model: "gemma4:31b-cloud"
  fallback_model: "gemma4:e4b"
  rag_db_path: "./data/vector_db"

# 7. HARDWARE ABSTRACTION LAYER
hal:
  enabled: true
  min_altitude_limit: 15.0

# 8. ВОТЧЕРЫ
watchers:
  debounce_seconds: 1.5
  ai_weather_status_file: "C:\\Users\\istep\\AppData\\Local\\NINA\\AIWeather\\status.json"
  dither_statistics_path: null
  guiding_analyzer_path: null
  dynamic_sequencer_path: null
  session_metadata:
    files:
      - "ImageMetaData.json"
      - "AcquisitionDetails.json"
      - "WeatherData.json"

# 9. ЛОГИРОВАНИЕ
logging:
  level: "INFO"
  format: "json"

# 10. CORS (локальное использование — упрощено)
cors:
  enabled: true
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
    - "http://localhost:8080"
    - "http://127.0.0.1:3000"
    - "http://127.0.0.1:5173"
  allow_credentials: true
  allowed_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
  allowed_headers: ["Content-Type", "X-Request-ID"]
  max_age: 3600


# 11. ПОРОГОВЫЕ ЗНАЧЕНИЯ
thresholds:
  # ================================================================
  # ОБЩИЕ ПОРОГИ СВЕЖЕСТИ КАЛИБРОВОК (С-2: YAML anchor)
  # ================================================================
  calibration_freshness: &calibration_freshness
    bias_freshness_days: 90
    dark_freshness_days: 30
    flat_freshness_days: 7
  
  watcher:
    hfr_increase_percent: 30.0
    fwhm_increase_percent: 30.0
    rms_ra_critical: 2.0
    rms_dec_critical: 2.0
    temperature_deviation: 2.0
    wind_speed_warning: 15.0
    wind_gust_critical: 20.0
    z_score_threshold: 3.0
    min_history_points: 5
    anomaly_cooldown_seconds: 300
  
  # ================================================================
  # CALIBRATOR (наследует calibration_freshness через YAML merge)
  # ================================================================
  calibrator:
    <<: *calibration_freshness
    temperature_tolerance: 2.0
    alert_cooldown_seconds: 600
  
  # ================================================================
  # PRE-FLIGHT CHECKLIST (20 gates в 6 категориях)
  # ================================================================
  preflight:
    # --- ENVIRONMENT (4 gates) ---
    cloud_cover_max: 80.0
    wind_speed_max: 20.0
    humidity_max: 90.0
    focuser_temp_min: -30.0
    focuser_temp_max: 40.0
    dew_risk_threshold: 3.0
    moon_avoidance_angle: 30.0
    # --- HARDWARE (5 gates) ---
    required_equipment:
      - "camera"
      - "mount"
      - "focuser"
      - "filterwheel"
      - "guider"
    optional_equipment:
      - "dome"
      - "rotator"
      - "safety_monitor"
      - "weather"
      - "switch"
    camera_cooled_threshold: -10.0
    focus_position_min: 0
    focus_position_max: 50000
    # --- CALIBRATION (2 gates) ---
    # Наследует calibration_freshness через YAML merge (С-2)
    <<: *calibration_freshness
    guider_calibration_max_age_hours: 24
    # --- STORAGE (2 gates) ---
    min_free_disk_space_gb: 50.0
    write_test_enabled: true
    # --- SOFTWARE (4 gates) ---
    api_timeout_seconds: 5.0
    llm_required_for_full_ai: true
    database_check_timeout_seconds: 3.0
    ntp_max_offset_seconds: 1.0
    ntp_server: "pool.ntp.org"
    # --- SEQUENCE (3 gates) ---
    sequence_min_nodes: 1
    min_altitude: 30.0
    mode_check_enabled: true



  strategist:
    snr_target: 20.0
    hfr_target: 2.5
    fwhm_target: 3.0
    acceptance_rate_target: 0.90
    autofocus_interval_normal: 60
    autofocus_interval_frequent: 30
    autofocus_interval_emergency: 15
    hfr_degradation_threshold: 0.05
    min_proposal_interval_seconds: 600
    wind_load_warning: 10.0

  guardian:
    wind_speed_park: 20.0
    cloud_cover_pause: 80.0
    humidity_warning: 90.0
    rms_recalibration: 3.0
    temperature_alarm: 5.0

  storage:
    warning_threshold_gb: 50.0
    critical_threshold_gb: 20.0
    retention_keep_last_days: 30
    retention_max_records: 100000

# 12. ИСТОЧНИКИ ДАННЫХ
# С-6: Добавлен stale_threshold_seconds
data_sources:
  primary_metrics_source: "influxdb"
  enable_fallback_source: true
  metrics_poll_interval: 3.0
  stale_threshold_seconds: 30.0  # Порог "InfluxDB stale" (секунды)

# 13. DECISION AUDIT TRAIL
decision_audit:
  keep_last_days: 90
  max_records: 100000
  archive_before_delete: true
  archive_path: "./data/decision_archives"
  auto_cleanup_enabled: true
  auto_cleanup_interval_hours: 24

# 14. SIMULATION MODE
simulation:
  flush_every_frames: 10
  flush_every_seconds: 30.0
  frame_delay_seconds: 2.0

# 15. МЕТРИКИ И ИСТОРИЯ
metrics:
  history_max_points: 100
  ai_action_log_max: 1000
  active_alerts_max: 50
  update_interval: 3.0

# 16. OPENAPI
openapi:
  spec_path: "config/nina_api_spec.json"
  auto_load: true
  cache_enabled: true

# 17. EXECUTION
execution:
  agent_aliases:
    autofocus: autofocus
    dither: guider_start
    guider_calibration: guider_calibrate
    phd2_settle: guider_start
    emergency_park: mount_park

# ============================================================================
# FEATURE FLAGS (поведенческие флаги)
# ============================================================================
feature_flags:
  rag:
    auto_update_enabled: false
    multimodal_enabled: false
    sqlite_integration_enabled: true
  hal:
    predictive_enabled: false
    confidence_threshold_critical: 0.95
    confidence_threshold_medium: 0.85
    confidence_threshold_low: 0.70
  analytics:
    decision_analyzer_enabled: true
    ml_parameter_optimizer: false
  shadow:
    mermaid_export_enabled: true
    d3_visualization_enabled: false
  metrics:
    auto_source_selection: true
  integrations:
    siril_enabled: false
  ml:
    rl_pipeline_enabled: false

# ============================================================================
# SECURITY (паттерны чувствительных данных)
# С-3: YAML anchor для переиспользования в global_var_injector
# ============================================================================
security:
  sensitive_patterns: &sensitive_patterns
    - token
    - password
    - passwd
    - secret
    - api_key
    - apikey
    - api-key
    - private_key
    - privatekey
    - credentials
    - auth
    - bearer
    - access_key
    - accesskey
    - secret_key
    - secretkey

# ============================================================================
# DISK MONITOR (только мониторинг, без удаления)
# ============================================================================
disk_monitor:
  check_interval_seconds: 3600
  auto_recommendations_enabled: true
  min_session_size_gb: 0.1
  max_recommendations_per_check: 50

# ============================================================================
# PREDICTIVE HAL CONFIGURATION
# ============================================================================
predictive_hal:
  window_short: 10
  window_medium: 20
  window_long: 40
  prediction_horizon_minutes: 5.0
  min_points_for_prediction: 8
  prediction_cooldown_seconds: 300
  points_per_minute: 20.0
  warning_temperature_celsius: -5.0

# ============================================================================
# RAG ENGINE CONFIGURATION
# ============================================================================
rag:
  chunk_sizes:
    documentation: 1000
    session: 500
    error_log: 300
  embedding_cache_max_size: 10000

# ============================================================================
# RAG UPDATER CONFIGURATION
# ============================================================================
rag_updater:
  docs_dir: "./docs"
  doc_extensions:
    - ".md"
    - ".txt"
    - ".rst"
  max_docs_per_run: 50

# ============================================================================
# METRICS SOURCE MONITOR CONFIGURATION
# ============================================================================
metrics_monitor:
  expected_metrics_count: 25
  history_size: 20

# ============================================================================
# PYTHON BRIDGE (Safety) CONFIGURATION
# ============================================================================
python_bridge:
  forbidden_substrings:
    - "import os"
    - "import sys"
    - "import subprocess"
    - "os.system"
    - "os.popen"
    - "subprocess."
    - "eval("
    - "exec("
    - "__import__"
    - "open("
    - "System.IO.File"
    - "System.Diagnostics.Process"
    - "System.Net.WebClient"
    - "System.Net.Http"

# ============================================================================
# GLOBAL VAR INJECTOR (Security) CONFIGURATION
# С-3: Использует YAML reference на security.sensitive_patterns
# ============================================================================
global_var_injector:
  sensitive_patterns: *sensitive_patterns

# ============================================================================
# DECISION ANALYZER CONFIGURATION
# ============================================================================
decision_analyzer:
  low_success_rate_threshold: 0.6
  low_sample_size: 10
  high_confidence_wrong_threshold: 0.7
  known_agents:
    - Watcher
    - Guardian
    - Diagnostician
    - Strategist
    - Auditor
    - Calibrator
    - Copilot
    - Orchestrator
    - HybridLangGraphOrchestrator

# ============================================================================
# SHADOW VISUALIZER CONFIGURATION
# ============================================================================
shadow_visualizer:
  critical_keywords:
    - shutdown
    - park
    - meridian
    - flip

# ============================================================================
# EMBEDDINGS CONFIGURATION
# ============================================================================
embeddings:
  model: "nomic-embed-text"
  cache_file: "./data/embeddings_cache.pkl"
  dimension: 768

# 15. МЕТРИКИ И ИСТОРИЯ
metrics:
  history_max_points: 100
  ai_action_log_max: 1000
  active_alerts_max: 50
  update_interval: 3.0
  # НОВОЕ (К-8): Параметры EventBus
  event_queue_maxsize: 10000        # Максимальный размер очереди событий
  event_stop_timeout_seconds: 5.0   # Таймаут graceful stop (секунды)

  # ============================================================================
# QUALITY SCORE CONFIGURATION (С-10: единый модуль расчёта)
# ============================================================================
# Веса факторов качества (должны суммироваться в 1.0)
quality_weights:
  hfr_weight: 0.30              # Half Flux Radius — основной показатель резкости
  eccentricity_weight: 0.20     # Эксцентричность звёзд — качество гидирования
  acceptance_rate_weight: 0.15  # Процент принятых кадров — стабильность системы
  rms_weight: 0.15              # RMS гидирования — стабильность монтировки
  hfr_trend_weight: 0.10       # Тренд HFR — стабильность во времени
  problems_weight: 0.10         # Количество проблем — общее здоровье сессии

# Пороговые значения для расчёта штрафов/бонусов
quality_thresholds:
  # HFR (pixels) — меньше = лучше
  hfr_excellent: 2.0
  hfr_good: 2.5
  hfr_acceptable: 3.0
  hfr_poor: 3.5
  # Eccentricity (0-1) — ближе к 0 = лучше
  eccentricity_excellent: 0.3
  eccentricity_good: 0.4
  eccentricity_acceptable: 0.5
  eccentricity_poor: 0.7
  # Acceptance Rate (0-1) — больше = лучше
  acceptance_excellent: 0.95
  acceptance_good: 0.90
  acceptance_acceptable: 0.80
  acceptance_poor: 0.70
  # RMS Total (arcsec) — меньше = лучше
  rms_excellent: 1.0
  rms_good: 1.5
  rms_acceptable: 2.0
  rms_poor: 3.0
  # HFR Trend (pixels/frame)
  hfr_trend_degrading: 0.05
  hfr_trend_stable: 0.02
  hfr_trend_improving: -0.02
  # Problems count
  problems_few: 2
  problems_many: 5