version: "3.8"

services:
  # Qdrant - Векторная база данных для RAG-системы
  qdrant:
    image: qdrant/qdrant:latest
    container_name: nina_cortex_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - cortex_network

  # InfluxDB 2.x - Time-series база данных для метрик
  influxdb:
    image: influxdb:2.7
    container_name: nina_cortex_influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=observatory
      - DOCKER_INFLUXDB_INIT_BUCKET=nina_telemetry
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN:-my-super-secret-token}
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    networks:
      - cortex_network

  # Ollama - Локальный LLM сервер (опционально, требует GPU/CPU ресурсов)
  # Раскомментируйте, если не используете локально установленный Ollama
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: nina_cortex_ollama
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   networks:
  #     - cortex_network
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]

volumes:
  qdrant_data:
    driver: local
  influxdb_data:
    driver: local
  influxdb_config:
    driver: local
  # ollama_data:
  #   driver: local

networks:
  cortex_network:
    driver: bridge
